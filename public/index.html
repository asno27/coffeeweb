<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Archive v.1.2 ☕</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 국기 이미지 라이브러리 CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f7f5f0; }
    </style>
</head>
<body class="text-stone-800 min-h-screen pb-12">

    <!-- 상단 헤더 -->
    <header class="bg-amber-900 text-amber-50 text-center py-8 shadow-md">
        <h1 class="text-3xl font-bold tracking-wide">☕ Coffee Archive v.1.2</h1>
        <p class="text-amber-200 mt-2 text-sm font-light">나만의 원두 기록과 평가를 체계적으로 관리하는 공간</p>
        <p class="text-amber-300/70 text-xs mt-1">v1.2 — 로스터리 주문 링크 미리보기 카드 추가</p>
    </header>

    <!-- 모바일 전용 탭 전환바 (목록 / 등록) -->
    <div class="lg:hidden sticky top-0 z-20 bg-[#f7f5f0]/95 backdrop-blur border-b border-stone-200 px-4 py-2 flex gap-2">
        <button id="tabList" class="mobile-tab-btn flex-1 py-2 rounded-lg text-sm font-semibold bg-amber-800 text-white">📋 목록 보기</button>
        <button id="tabForm" class="mobile-tab-btn flex-1 py-2 rounded-lg text-sm font-semibold bg-stone-100 text-stone-600">📝 원두 등록</button>
    </div>

    <div class="max-w-6xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- 왼쪽: 원두 등록 및 수정 폼 -->
        <div id="formPanel" class="hidden lg:block bg-white p-6 rounded-xl shadow-sm border border-stone-200 h-fit lg:sticky lg:top-6">
            <h2 id="formTitle" class="text-xl font-bold mb-4 border-b pb-2 text-amber-900">새로운 원두 기록하기</h2>
            <form id="coffeeForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">로스터리 이름</label>
                    <input type="text" id="roastery" required placeholder="예: 모모스커피, 블루보틀" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-700">
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">원두 이름</label>
                    <input type="text" id="beanName" required placeholder="예: 에티오피아 옐로우 허니" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-700">
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">원두 종류</label>
                    <div class="flex gap-4 mt-1">
                        <label class="flex items-center gap-1 cursor-pointer">
                            <input type="radio" name="beanType" value="Single" checked class="text-amber-700 focus:ring-amber-700"> 싱글 오리진
                        </label>
                        <label class="flex items-center gap-1 cursor-pointer">
                            <input type="radio" name="beanType" value="Blend" class="text-amber-700 focus:ring-amber-700"> 블렌드
                        </label>
                    </div>
                </div>
                <div id="countryWrapper">
                    <label class="block text-sm font-medium text-stone-600 mb-1">생산국 (싱글오리진 전용)</label>
                    <select id="country" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-700">
                        <option value="에티오피아">에티오피아 (Ethiopia)</option>
                        <option value="케냐">케냐 (Kenya)</option>
                        <option value="콜롬비아">콜롬비아 (Colombia)</option>
                        <option value="브라질">브라질 (Brazil)</option>
                        <option value="엘살바도르">엘살바도르 (El Salvador)</option>
                        <option value="과테말라">과테말라 (Guatemala)</option>
                        <option value="페루">페루 (Peru)</option>
                        <option value="에콰도르">에콰도르 (Ecuador)</option>
                        <option value="코스타리카">코스타리카 (Costa Rica)</option>
                        <option value="르완다">르완다 (Rwanda)</option>
                        <option value="베트남">베트남 (Vietnam)</option>
                        <option value="인도네시아">인도네시아 (Indonesia)</option>
                        <option value="태국">태국 (Thailand)</option>
                        <option value="탄자니아">탄자니아 (Tanzania)</option>
                        <option value="볼리비아">볼리비아 (Bolivia)</option>
                        <option value="파나마">파나마 (Panama)</option>
                        <option value="온두라스">온두라스 (Honduras)</option>
                        <option value="파푸아뉴기니">파푸아뉴기니 (Papua New Guinea)</option>
                        <option value="카메룬">카메룬 (Cameroon)</option>
                        <option value="기타">기타 / 블렌드</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">로스터리 제공 공식 정보</label>
                    <textarea id="roasteryInfo" rows="2" placeholder="컵 노트, 가공 방식(Process), 재배 고도 등" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-700 text-sm"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-stone-600 mb-1">로스팅 날짜</label>
                        <input type="date" id="roastDate" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-700 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-stone-600 mb-1">구매일</label>
                        <input type="date" id="purchaseDate" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-700 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">로스터리 주문 링크 (선택)</label>
                    <input type="url" id="orderLink" placeholder="https://roastery.com/product/..." class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-700 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">원두 사진</label>
                    <input type="file" id="photo" accept="image/*" class="w-full text-sm text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-amber-50 file:text-amber-900 hover:file:bg-amber-100">
                    <p id="editPhotoNotice" class="text-xs text-amber-700 mt-1 hidden">* 수정 시 사진을 새로 첨부하지 않으면 기존 사진이 유지됩니다.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">나의 별점</label>
                    <div class="flex gap-1 text-2xl" id="starRating">
                        <span class="star cursor-pointer text-amber-400" data-value="1">★</span>
                        <span class="star cursor-pointer text-amber-400" data-value="2">★</span>
                        <span class="star cursor-pointer text-amber-400" data-value="3">★</span>
                        <span class="star cursor-pointer text-amber-400" data-value="4">★</span>
                        <span class="star cursor-pointer text-stone-300" data-value="5">★</span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-600 mb-1">나의 한줄평 / 리뷰</label>
                    <textarea id="review" rows="3" required placeholder="테이스팅 평이나 다음에도 마실 의향이 있는지 기록해 보세요." class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-700"></textarea>
                </div>
                <div class="space-y-2">
                    <button type="submit" id="submitBtn" class="w-full bg-amber-800 text-white py-2.5 rounded-lg font-medium hover:bg-amber-900 transition shadow">원두 등록하기</button>
                    <button type="button" id="cancelEditBtn" class="hidden w-full bg-stone-400 text-white py-2.5 rounded-lg font-medium hover:bg-stone-500 transition shadow">수정 취소하기</button>
                </div>
            </form>
        </div>

        <!-- 오른쪽: 등록된 원두 목록 대시보드 -->
        <div id="listPanel" class="lg:col-span-2 space-y-6">
            <!-- 필터 바 -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex gap-2">
                    <button id="filterAll" class="px-3 py-1.5 rounded-full bg-amber-800 text-white text-sm font-medium">전체보기</button>
                    <button id="filterSingle" class="px-3 py-1.5 rounded-full bg-stone-100 text-stone-600 text-sm font-medium hover:bg-stone-200">싱글오리진</button>
                    <button id="filterBlend" class="px-3 py-1.5 rounded-full bg-stone-100 text-stone-600 text-sm font-medium hover:bg-stone-200">블렌드</button>
                </div>
                <select id="sortOrder" class="border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-700">
                    <option value="latest">최신 등록순</option>
                    <option value="stars">별점 높은순</option>
                </select>
            </div>

            <!-- 아카이브 카드 출력 영역 -->
            <div id="archiveGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-center text-stone-500 col-span-2 py-12">Firebase에서 커피 데이터를 불러오는 중입니다...</p>
            </div>
        </div>

    </div>

    <!-- Firebase SDK 모듈 로드 및 로직 구현 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

        // 사용자 제공 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAfcn90J0J_Y8kynjXhLd_9mdLeUo5wOdY",
            authDomain: "coffee-f70dc.firebaseapp.com",
            projectId: "coffee-f70dc",
            storageBucket: "coffee-f70dc.firebasestorage.app",
            messagingSenderId: "898551556058",
            appId: "1:898551556058:web:e54ad77b7c377d03d442e3",
            measurementId: "G-ECXC5VXDN3"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // 국가 코드 매핑 (ISO 3166-1 2자리)
        const countryCodes = {
            "에티오피아": "et", "케냐": "ke", "콜롬비아": "co", "브라질": "br", 
            "엘살바도르": "sv", "과테말라": "gt", "페루": "pe", "에콰도르": "ec", 
            "코스타리카": "cr", "르완다": "rw", "베트남": "vn", "인도네시아": "id", 
            "태국": "th", "탄자니아": "tz", "볼리비아": "bo", "파나마": "pa", 
            "온두라스": "hn", "파푸아뉴기니": "pg", "카메룬": "cm"
        };

        let currentRating = 4;
        let allBeans = [];
        let currentFilter = 'all';

        // 모바일 탭 전환 (목록 / 등록)
        const formPanel = document.getElementById('formPanel');
        const listPanel = document.getElementById('listPanel');
        const tabList = document.getElementById('tabList');
        const tabForm = document.getElementById('tabForm');

        function showMobileTab(tab) {
            const isForm = tab === 'form';
            formPanel.classList.toggle('hidden', !isForm);
            listPanel.classList.toggle('hidden', isForm);
            // lg(데스크탑) 이상에서는 항상 둘 다 보이게
            formPanel.classList.add('lg:block');
            listPanel.classList.remove('hidden', 'lg:block');
            tabForm.className = `mobile-tab-btn flex-1 py-2 rounded-lg text-sm font-semibold ${isForm ? 'bg-amber-800 text-white' : 'bg-stone-100 text-stone-600'}`;
            tabList.className = `mobile-tab-btn flex-1 py-2 rounded-lg text-sm font-semibold ${!isForm ? 'bg-amber-800 text-white' : 'bg-stone-100 text-stone-600'}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        tabList.addEventListener('click', () => showMobileTab('list'));
        tabForm.addEventListener('click', () => showMobileTab('form'));
        // 모바일 기본값: 목록부터 보여주기
        showMobileTab('list');
        
        // 수정 모드 상태 변수
        let currentEditId = null;
        let existingImageUrl = "";

        // 싱글오리진/블렌드 선택 시 생산국 메뉴 온오프 토글
        document.querySelectorAll('input[name="beanType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const wrapper = document.getElementById('countryWrapper');
                if (e.target.value === 'Blend') {
                    wrapper.style.opacity = '0.5';
                    document.getElementById('country').value = '기타';
                } else {
                    wrapper.style.opacity = '1';
                }
            });
        });

        // 별점 UI 클릭 제어
        const stars = document.querySelectorAll('#starRating .star');
        stars.forEach(star => {
            star.addEventListener('click', (e) => {
                currentRating = parseInt(e.target.getAttribute('data-value'));
                updateStarUI(currentRating);
            });
        });

        function updateStarUI(rating) {
            stars.forEach((s, idx) => {
                if (idx < rating) {
                    s.classList.remove('text-stone-300');
                    s.classList.add('text-amber-400');
                } else {
                    s.classList.remove('text-amber-400');
                    s.classList.add('text-stone-300');
                }
            });
        }

        // 데이터 불러오기 함수
        async function fetchBeans() {
            const archiveGrid = document.getElementById('archiveGrid');
            try {
                const q = query(collection(db, "beans"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                allBeans = [];
                querySnapshot.forEach((doc) => {
                    allBeans.push({ id: doc.id, ...doc.data() });
                });
                renderBeans();
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                archiveGrid.innerHTML = `<p class="text-red-500 col-span-2 text-center">데이터를 불러오지 못했습니다. Firebase 규칙(Rules)을 확인해 주세요.</p>`;
            }
        }

        // 화면 렌더링 함수
        function renderBeans() {
            const archiveGrid = document.getElementById('archiveGrid');
            const sortOrder = document.getElementById('sortOrder').value;

            let filtered = allBeans.filter(bean => {
                if (currentFilter === 'single') return bean.beanType === 'Single';
                if (currentFilter === 'blend') return bean.beanType === 'Blend';
                return true;
            });

            if (sortOrder === 'stars') {
                filtered.sort((a, b) => b.rating - a.rating);
            }

            if (filtered.length === 0) {
                archiveGrid.innerHTML = `<p class="text-stone-500 text-center col-span-2 py-12">등록된 원두가 없습니다.</p>`;
                return;
            }

            archiveGrid.innerHTML = filtered.map(bean => {
                const code = countryCodes[bean.country];
                const flagHtml = bean.beanType === 'Single' && code 
                    ? `<span class="fi fi-${code} rounded-sm shadow-sm text-xl w-6 h-4 inline-block"></span>` 
                    : `<span class="text-amber-800 font-semibold">☕</span>`;
                
                const starStr = '★'.repeat(bean.rating) + '☆'.repeat(5 - bean.rating);

                // 로스팅 후 경과일 계산 (신선도 뱃지)
                let freshnessHtml = '';
                if (bean.roastDate) {
                    const days = Math.floor((new Date() - new Date(bean.roastDate)) / (1000 * 60 * 60 * 24));
                    let badgeColor = 'bg-stone-100 text-stone-500';
                    if (days <= 14) badgeColor = 'bg-green-100 text-green-700';
                    else if (days <= 30) badgeColor = 'bg-amber-100 text-amber-700';
                    else badgeColor = 'bg-red-100 text-red-600';
                    freshnessHtml = `<span class="${badgeColor} text-[10px] font-semibold px-2 py-0.5 rounded-full whitespace-nowrap">로스팅 ${days}일째</span>`;
                }
                
                return `
                    <div onclick="toggleDetails('${bean.id}')" 
                         class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden hover:shadow-md transition cursor-pointer p-4 h-fit">
                        
                        <!-- 닫혀있을 때 보이는 요약 정보 -->
                        <div class="flex items-center justify-between gap-2">
                            <div class="flex items-center gap-3 min-w-0">
                                <div class="flex items-center">${flagHtml}</div>
                                <div class="min-w-0">
                                    <span class="text-[11px] text-stone-400 font-medium block leading-none mb-1">${bean.roastery}</span>
                                    <h3 class="text-sm font-bold text-stone-800 leading-snug truncate">${bean.beanName}</h3>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                ${freshnessHtml}
                                <span class="text-stone-400 text-xs select-none">▼</span>
                            </div>
                        </div>
                        
                        <!-- 클릭하면 펼쳐지는 상세 항목 -->
                        <div id="details-${bean.id}" class="hidden mt-4 pt-4 border-t border-stone-100 space-y-4" onclick="event.stopPropagation()">
                            
                            ${bean.imageUrl ? `
                                <div class="h-44 bg-stone-100 rounded-lg overflow-hidden">
                                    <img src="${bean.imageUrl}" alt="${bean.beanName}" class="w-full h-full object-cover">
                                </div>
                            ` : ''}

                            ${(bean.roastDate || bean.purchaseDate) ? `
                                <div class="flex gap-4 text-xs text-stone-500">
                                    ${bean.roastDate ? `<span>🔥 로스팅일: <b class="text-stone-700">${bean.roastDate}</b></span>` : ''}
                                    ${bean.purchaseDate ? `<span>🛒 구매일: <b class="text-stone-700">${bean.purchaseDate}</b></span>` : ''}
                                </div>
                            ` : ''}

                            ${bean.orderLink ? `<div id="linkpreview-${bean.id}" data-url="${bean.orderLink.replace(/"/g, '&quot;')}"></div>` : ''}
                            
                            ${bean.roasteryInfo ? `
                                <div class="bg-stone-50 p-2.5 rounded-lg text-xs text-stone-600 border border-stone-100">
                                    <strong class="text-stone-500 block mb-1">📋 로스터리 제공 정보</strong>
                                    <p class="whitespace-pre-line">${bean.roasteryInfo}</p>
                                </div>
                            ` : ''}

                            <div class="bg-amber-50/60 p-3 rounded-lg border border-amber-100/50">
                                <strong class="text-amber-900 text-xs block mb-1">✍️ 나의 평가</strong>
                                <p class="text-sm text-stone-700 italic">"${bean.review}"</p>
                            </div>

                            <div class="flex justify-between items-center text-xs pt-1">
                                <span class="text-amber-500 font-semibold text-sm">${starStr}</span>
                                <span class="text-stone-400">${bean.beanType === 'Single' ? bean.country : '블렌드'}</span>
                            </div>

                            <!-- 수정 및 삭제 버튼 관리 영역 -->
                            <div class="flex gap-2 pt-2 border-t border-stone-100">
                                <button onclick="startEdit('${bean.id}')" class="flex-1 bg-amber-700 text-white text-xs py-2 rounded-lg hover:bg-amber-800 transition font-medium">✏️ 수정</button>
                                <button onclick="deleteBean('${bean.id}')" class="flex-1 bg-stone-100 text-stone-600 text-xs py-2 rounded-lg hover:bg-stone-200 transition font-medium">🗑️ 삭제</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 카드 펼치기/접기 + 처음 펼칠 때만 링크 미리보기 불러오기 (lazy load)
        const linkPreviewCache = {}; // url -> {title, image} 캐시 (중복 호출 방지)
        window.toggleDetails = function(id) {
            const detailsEl = document.getElementById(`details-${id}`);
            const wasHidden = detailsEl.classList.contains('hidden');
            detailsEl.classList.toggle('hidden');
            if (wasHidden) {
                const previewEl = document.getElementById(`linkpreview-${id}`);
                if (previewEl && !previewEl.dataset.loaded) {
                    previewEl.dataset.loaded = '1';
                    loadLinkPreview(previewEl, previewEl.dataset.url);
                }
            }
        };

        // 무료 메타데이터 API(microlink.io)로 주문 링크의 썸네일/제목을 가져와 카드에 표시
        async function loadLinkPreview(container, url) {
            container.innerHTML = `<div class="text-xs text-stone-400 py-2">🔗 링크 미리보기 불러오는 중...</div>`;
            try {
                let data = linkPreviewCache[url];
                if (!data) {
                    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                    const json = await res.json();
                    if (json.status !== 'success') throw new Error('preview failed');
                    data = {
                        title: json.data.title || url,
                        image: json.data.image?.url || json.data.logo?.url || ''
                    };
                    linkPreviewCache[url] = data;
                }
                container.innerHTML = `
                    <a href="${url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()"
                       class="flex items-center gap-3 border border-stone-200 rounded-lg overflow-hidden hover:bg-stone-50 transition">
                        ${data.image ? `<img src="${data.image}" class="w-16 h-16 object-cover shrink-0" alt="">` : `<div class="w-16 h-16 bg-amber-50 flex items-center justify-center text-xl shrink-0">🛒</div>`}
                        <div class="min-w-0 py-2 pr-3">
                            <p class="text-xs font-semibold text-stone-700 truncate">${data.title}</p>
                            <p class="text-[10px] text-amber-700 mt-0.5">주문 페이지로 이동 →</p>
                        </div>
                    </a>`;
            } catch (e) {
                console.error('링크 미리보기 실패:', e);
                container.innerHTML = `
                    <a href="${url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()"
                       class="flex items-center gap-2 text-xs text-amber-700 border border-stone-200 rounded-lg p-2.5 hover:bg-stone-50 transition">
                        🛒 주문 페이지 보기 (미리보기를 불러오지 못했어요)
                    </a>`;
            }
        }

        // 수정 기능 시작 바인딩 함수
        window.startEdit = function(id) {
            const bean = allBeans.find(b => b.id === id);
            if (!bean) return;

            currentEditId = id;
            existingImageUrl = bean.imageUrl || "";

            // 폼 필드 채우기
            document.getElementById('formTitle').innerText = "원두 정보 수정하기 ✏️";
            document.getElementById('roastery').value = bean.roastery;
            document.getElementById('beanName').value = bean.beanName;
            
            const radios = document.querySelectorAll('input[name="beanType"]');
            radios.forEach(r => {
                if (r.value === bean.beanType) r.checked = true;
            });

            const wrapper = document.getElementById('countryWrapper');
            if (bean.beanType === 'Blend') {
                wrapper.style.opacity = '0.5';
                document.getElementById('country').value = '기타';
            } else {
                wrapper.style.opacity = '1';
                document.getElementById('country').value = bean.country || '기타';
            }

            document.getElementById('roasteryInfo').value = bean.roasteryInfo || "";
            document.getElementById('roastDate').value = bean.roastDate || "";
            document.getElementById('purchaseDate').value = bean.purchaseDate || "";
            document.getElementById('orderLink').value = bean.orderLink || "";
            document.getElementById('review').value = bean.review;
            
            currentRating = bean.rating;
            updateStarUI(currentRating);

            // UI 변경
            document.getElementById('submitBtn').innerText = "수정 완료하기";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('editPhotoNotice').classList.remove('hidden');

            // 모바일에서는 등록 폼 탭으로 자동 전환
            if (window.innerWidth < 1024) showMobileTab('form');

            // 화면을 상단 폼 위치로 부드럽게 스크롤
            document.getElementById('coffeeForm').scrollIntoView({ behavior: 'smooth' });
        };

        // 수정 취소 함수
        window.cancelEdit = function() {
            currentEditId = null;
            existingImageUrl = "";
            
            document.getElementById('coffeeForm').reset();
            document.getElementById('formTitle').innerText = "새로운 원두 기록하기";
            document.getElementById('submitBtn').innerText = "원두 등록하기";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('editPhotoNotice').classList.add('hidden');
            
            document.getElementById('countryWrapper').style.opacity = '1';
            currentRating = 4;
            updateStarUI(4);
            if (window.innerWidth < 1024) showMobileTab('list');
        };
        
        document.getElementById('cancelEditBtn').addEventListener('click', window.cancelEdit);

        // 삭제 기능 함수
        window.deleteBean = async function(id) {
            if (!confirm("정말 이 원두 기록을 영구적으로 삭제하시겠습니까?")) return;
            try {
                await deleteDoc(doc(db, "beans", id));
                alert("🗑️ 원두 기록이 삭제되었습니다.");
                await fetchBeans();
            } catch (error) {
                console.error("삭제 실패:", error);
                alert("삭제 처리에 실패했습니다. 권한을 확인해 주세요.");
            }
        };

        // 폼 제출 (원두 데이터 등록 또는 수정)
        document.getElementById('coffeeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "저장 중...";

            const roastery = document.getElementById('roastery').value;
            const beanName = document.getElementById('beanName').value;
            const beanType = document.querySelector('input[name="beanType"]:checked').value;
            const country = document.getElementById('country').value;
            const roasteryInfo = document.getElementById('roasteryInfo').value;
            const roastDate = document.getElementById('roastDate').value;
            const purchaseDate = document.getElementById('purchaseDate').value;
            const orderLink = document.getElementById('orderLink').value;
            const review = document.getElementById('review').value;
            const photoFile = document.getElementById('photo').files[0];

            let imageUrl = currentEditId ? existingImageUrl : "";

            try {
                // 사진 파일이 새로 첨부되었을 때만 파일 업로드 수행
                if (photoFile) {
                    const storageRef = ref(storage, `coffee_images/${Date.now()}_${photoFile.name}`);
                    const snapshot = await uploadBytes(storageRef, photoFile);
                    imageUrl = await getDownloadURL(snapshot.ref);
                }

                const beanData = {
                    roastery,
                    beanName,
                    beanType,
                    country,
                    roasteryInfo,
                    roastDate,
                    purchaseDate,
                    orderLink,
                    review,
                    rating: currentRating,
                    imageUrl,
                    updatedAt: new Date().toISOString()
                };

                if (currentEditId) {
                    // 1. 수정 모드
                    await updateDoc(doc(db, "beans", currentEditId), beanData);
                    window.cancelEdit();
                    alert("☕ 원두 정보가 완벽하게 수정되었습니다!");
                } else {
                    // 2. 신규 등록 모드
                    beanData.createdAt = new Date().toISOString();
                    await addDoc(collection(db, "beans"), beanData);
                    document.getElementById('coffeeForm').reset();
                    currentRating = 4;
                    updateStarUI(4);
                    alert("☕ 새로운 원두가 성공적으로 아카이브에 기록되었습니다!");
                    if (window.innerWidth < 1024) showMobileTab('list');
                }

                await fetchBeans();

            } catch (error) {
                console.error("저장 실패:", error);
                alert("저장 처리에 실패했습니다. Firebase 설정을 확인해 주세요.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = currentEditId ? "수정 완료하기" : "원두 등록하기";
            }
        });

        // 필터 및 정렬 이벤트 바인딩
        document.getElementById('filterAll').addEventListener('click', (e) => { toggleFilter('all', e.target); });
        document.getElementById('filterSingle').addEventListener('click', (e) => { toggleFilter('single', e.target); });
        document.getElementById('filterBlend').addEventListener('click', (e) => { toggleFilter('blend', e.target); });
        document.getElementById('sortOrder').addEventListener('change', renderBeans);

        function toggleFilter(filterType, targetBtn) {
            currentFilter = filterType;
            document.querySelectorAll('button[id^="filter"]').forEach(btn => {
                btn.className = "px-3 py-1.5 rounded-full bg-stone-100 text-stone-600 text-sm font-medium hover:bg-stone-200";
            });
            targetBtn.className = "px-3 py-1.5 rounded-full bg-amber-800 text-white text-sm font-medium";
            renderBeans();
        }

        // 앱 기동 시 최초 로드
        fetchBeans();
    </script>
</body>
</html>
